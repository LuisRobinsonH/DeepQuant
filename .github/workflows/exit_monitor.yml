# ══════════════════════════════════════════════════════════════════
#  EXIT MONITOR — Corre cada 15 min durante el horario ASX
#  ASX: 10:00-16:00 AEDT (UTC+11) = 23:00-05:00 UTC
#       10:00-16:00 AEST (UTC+10) = 00:00-06:00 UTC
#  Cubre ambas temporadas con ventana 22:30-06:00 UTC
#  Si portfolio está vacío: termina en <10 segundos (sin costo real)
# ══════════════════════════════════════════════════════════════════
name: TitanBrain — Exit Monitor (15min)

on:
  workflow_dispatch:                    # Solo trigger manual desde GitHub UI

jobs:
  exit-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Restaurar estado privado (portfolio/trades)
        id: restore-state
        uses: actions/cache/restore@v4
        with:
          path: |
            current_portfolio.json
            trade_history.json
            stop_history.json
            .pending_buys.json
          key: portfolio-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            portfolio-state-${{ github.ref_name }}-

      - name: Inicializar archivos de estado si faltan
        run: |
          [ -f current_portfolio.json ] || echo '{}' > current_portfolio.json
          [ -f trade_history.json ] || echo '[]' > trade_history.json
          [ -f stop_history.json ] || echo '{}' > stop_history.json
          [ -f .pending_buys.json ] || echo '{}' > .pending_buys.json

      # ── Salida rápida si portfolio está vacío ─────────────────────
      - name: Verificar portfolio
        id: check-portfolio
        run: |
          EMPTY=$(python -c "
          import json, sys
          try:
              pf = json.load(open('current_portfolio.json'))
              print('true' if not pf else 'false')
          except:
              print('true')
          ")
          echo "empty=$EMPTY" >> $GITHUB_OUTPUT

      - name: Saltar si portfolio vacío
        if: steps.check-portfolio.outputs.empty == 'true' && steps.restore-state.outputs.cache-matched-key != ''
        run: |
          echo "✅ Portfolio vacío — nada que monitorear. Job terminado."
          exit 0

      - name: Fallar si se perdió estado (cache miss + portfolio vacío)
        if: steps.restore-state.outputs.cache-matched-key == '' && steps.check-portfolio.outputs.empty == 'true'
        run: |
          echo "❌ Cache miss y portfolio vacío: se perdió estado privado (current_portfolio/trade_history)."
          echo "❌ Rehidrata estado antes de continuar para no perder monitoreo de salidas."
          exit 1

      # ── Solo si hay posiciones abiertas ───────────────────────────
      - name: Cache pip
        if: steps.check-portfolio.outputs.empty == 'false'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements_ci.txt') }}
          restore-keys: pip-

      - name: Instalar dependencias
        if: steps.check-portfolio.outputs.empty == 'false'
        run: pip install -r requirements_ci.txt --quiet

      - name: Calcular semana del año
        if: steps.check-portfolio.outputs.empty == 'false'
        run: echo "WEEK=$(date +%Y-W%V)" >> $GITHUB_ENV

      - name: Restaurar modelos ML
        if: steps.check-portfolio.outputs.empty == 'false'
        uses: actions/cache@v4
        with:
          path: |
            models_cache.joblib
            features_cache.joblib
          key: models-${{ env.WEEK }}-${{ hashFiles('train_model_2021_2025.py') }}
          restore-keys: models-

      - name: Ejecutar Exit Monitor
        if: steps.check-portfolio.outputs.empty == 'false'
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONIOENCODING: utf-8
        run: python alerts_live.py exit-monitor

      - name: Guardar estado privado (cache)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            current_portfolio.json
            trade_history.json
            stop_history.json
            .pending_buys.json
          key: portfolio-state-${{ github.ref_name }}-${{ github.run_id }}
